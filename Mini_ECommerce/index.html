<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Mini E-Commerce</title>
    <link rel="stylesheet" href="estilos.css">

</head>
<body>
    <header class="header">
        <h1>TECH STORE</h1>
        <p class="texto-header">Find the best technology products at the best prices</p>
        <ul>
            <li><a href="inicio.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="shopping_cart">Shopping cart</a></li>
            <li><a href="about_us.html">About us</a></li>
        </ul>
    </header>

    <main>
        <section>

            <!------ CONTENEDOR KEYBOARD ---------------->
            <div class="contenedores-productos">
                <h3>Mechanical Keyboard</h3>
                <div class="contenedor-imagen">
                    <img src="https://gamakay.com/cdn/shop/files/Gamakay_TK75_SOCD_silent_mechanical_keyboard.jpg?v=1776059007&width=200" >
                </div>

            <!------ CONTENEDOR MOUSE ---------------->
            <div class="contenedores-productos">
                <h3>Wireless Mouse</h3>
                <div class="contenedor-imagen">

            <div class="contenedores-productos">
                <h3>Gaming Headset</h3>
                <div class="contenedor-imagen">
                    <img  src="https://m.media-amazon.com/images/I/71A8gMWDq5L.jpg">
                </div>
                <p class="precio">Precio: $35</p>
                <button class="boton_agregar_a_carrito">Add to cart</button>
            </div>

            <!------ CONTENEDOR MONITOR ---------------->
            <div class="contenedores-productos">
                <h3>"27" Monitor</h3>
                <div class="contenedor-imagen">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRb2Xok1qDWl57JiO8d1kHhpdIG1FAvb1RJnR5XIgmvmut-dx1vvB7GAf_h&s=10"/>

                <button class="boton_agregar_a_carrito">Add to cart</button>
            </div>

             <!------ CONTENEDOR USB-C ---------------->
            <div class="contenedores-productos">
                <h3>USB-C Hub</h3>
                <div class="contenedor-imagen">

            <!------ CONTENEDOR LAPTOP STAND ------------>
            <div class="contenedores-productos">
                <h3>Laptop Stand</h3>
                <div class="contenedor-imagen">
                    <img src="https://media.startech.com/cms/products/gallery_large/adj-laptop-riser.main.jpg">
                </div>
                <p class="precio">Precio: $55</p>
                <button class="boton_agregar_a_carrito">Add to cart</button>
            </div>
